version: 0.0
os: linux

files:
  - source: frontend/dist
    destination: /var/www/webprojec

permissions:
  - object: /var/www/webprojec
    pattern: '**'
    mode: '0755'
    owner: root
    group: root
    type:
      - file
      - directory

hooks:
  ApplicationStart:
    - location: deploy-scripts/application-start-hook.sh
      timeout: 300
      