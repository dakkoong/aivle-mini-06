version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
      nodejs: 20
    commands:
      - echo "Install phase"

  pre_build:
    commands:
      - echo "Installing frontend dependencies"
      - cd frontend
      - npm ci
      - cd ../backend
      - chmod +x gradlew

  build:
    commands:
      - echo "Building frontend"
      - cd ../frontend
      - npm run build
      - echo "Building backend"
      - cd ../backend
      - ./gradlew clean build -x test

  post_build:
    commands:
      - echo "Build completed"
      - cd $CODEBUILD_SRC_DIR
      - mkdir -p dist
      - cp -r frontend/dist/* dist/ 2>/dev/null || cp -r frontend/dist/.[!.]* dist/ 2>/dev/null || true

artifacts:
  files:
    - 'frontend/dist/**/*'
    - appspec.yml
    - 'deploy-scripts/**/*'
    - 'backend/build/libs/*.jar/'
  discard-paths: no

